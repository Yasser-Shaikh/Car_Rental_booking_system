<!doctype html>
<html lang="en">
  <head>
    <title>Admin Login</title>
    <style>
      body {
        background: #199f98;
        color: white;
        font-family: Arial;
        text-align: center;
        margin-top: 100px;
      }
      input {
        padding: 10px;
        margin: 10px;
        width: 250px;
      }
      button {
        padding: 10px 20px;
        background: #28a745;
        color: white;
        border: none;
      }
    </style>
  </head>
  <body>
    <h2>Admin Login</h2>

    <form method="POST">
      <input
        type="text"
        name="username"
        placeholder="Username"
        required
      /><br />
      <input
        type="password"
        name="password"
        placeholder="Password"
        required
      /><br />
      <button type="submit">Login</button>
    </form>
  </body>
</html>
