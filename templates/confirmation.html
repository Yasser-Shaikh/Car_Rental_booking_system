<!doctype html>
<html>
  <head>
    <title>Booking Confirmed</title>
  </head>

    style="
      text-align: center;
      font-family: Arial;
      background: #12b66aa3;
      color: white;
      margin-top: 100px;
    "
  >
    <h1>🎉 Booking Confirmed!</h1>

    <p><strong>Name:</strong> {{ name }}</p>
